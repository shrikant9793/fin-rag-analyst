# =============================================================================
# fin-rag-analyst — docker-compose.yml
# Full stack: Qdrant + Langfuse + PostgreSQL
# =============================================================================

version: "3.8"

services:
  # =========================================================================
  # PostgreSQL — backend for Langfuse
  # =========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: fin-rag-postgres
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_secret
      POSTGRES_DB: langfuse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Qdrant — Vector database for RAG retrieval
  # =========================================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fin-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    environment:
      QDRANT_API_KEY: ""  # Optional: leave empty or set a key
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================================================================
  # Langfuse — Observability and tracing for LLM calls
  # =========================================================================
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: fin-rag-langfuse
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse_secret@postgres:5432/langfuse"
      NEXTAUTH_SECRET: "your-secret-key-change-this"
      NEXTAUTH_URL: "http://localhost:3000"
      SALT: "your-salt-change-this"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:

networks:
  default:
    name: fin-rag-network
